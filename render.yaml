databases:
  - name: biologic-db
    plan: basic-256mb
    databaseName: biologic
    user: biologic
    postgresMajorVersion: "16"

services:
  - type: web
    name: biologic
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm ci && npm run build && npm run db:push -- --force
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: biologic-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        value: https://www.mybiologic.de
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@mybiologic.de
      - key: ADMIN_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ZAPIER_WEBHOOK_ENROLL
        sync: false
